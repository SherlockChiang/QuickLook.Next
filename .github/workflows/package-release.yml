name: Package Release

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
    outputs:
      version:
        value: ${{ jobs.package.outputs.version }}
      tag:
        value: ${{ jobs.package.outputs.tag }}
      artifact-name:
        value: ${{ jobs.package.outputs.artifact-name }}
      msix-version:
        value: ${{ jobs.package.outputs.msix-version }}
    secrets:
      QUICKLOOK_RELEASE_PFX_BASE64:
        required: true
      QUICKLOOK_RELEASE_PFX_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-2025
    timeout-minutes: 40
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      artifact-name: ${{ steps.version.outputs.artifact_name }}
      msix-version: ${{ steps.version.outputs.msix_version }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.302

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.96.0
          targets: x86_64-pc-windows-msvc

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ inputs.channel }}" -eq "stable") {
            $release = ./tools/resolve-auto-release.ps1
            $version = $release.Version
            $suffix = ""
            $previousTag = $release.PreviousTag
          }
          elseif ("${{ inputs.channel }}" -eq "beta") {
            $version = (Get-Content -LiteralPath VERSION -Raw).Trim()
            if ($version -notmatch '^\d+\.\d+\.\d+$') { throw "VERSION must use semantic X.Y.Z format." }
            $suffix = "beta.${{ github.run_number }}"
            $previousTag = (git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-version:refname | Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } | Select-Object -First 1)
          }
          else { throw "Unknown release channel: ${{ inputs.channel }}" }
          $packageVersion = if ($suffix) { "$version-$suffix" } else { $version }
          $version | Set-Content -LiteralPath VERSION -Encoding ascii
          "version=$packageVersion" >> $env:GITHUB_OUTPUT
          "tag=v$packageVersion" >> $env:GITHUB_OUTPUT
          "artifact_name=QuickLook.Next-$packageVersion-win-x64" >> $env:GITHUB_OUTPUT
          "base_version=$version" >> $env:GITHUB_OUTPUT
          "suffix=$suffix" >> $env:GITHUB_OUTPUT
          "previous_tag=$previousTag" >> $env:GITHUB_OUTPUT
          "msix_version=$version.0" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        shell: pwsh
        run: |
          ./tools/new-release-notes.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -PreviousTag "${{ steps.version.outputs.previous_tag }}" `
            -Repository "$env:GITHUB_REPOSITORY" `
            -OutputPath artifacts/release-notes.md

      - name: Check NuGet vulnerabilities
        shell: pwsh
        run: dotnet list QuickLook.Next.slnx package --vulnerable --include-transitive

      - name: Audit Rust dependencies
        shell: pwsh
        run: |
          cargo install cargo-audit --version 0.21.2 --locked
          cargo audit --file native/quicklook_next_native/Cargo.lock

      - name: Restore release signing certificate
        shell: pwsh
        env:
          RELEASE_PFX_BASE64: ${{ secrets.QUICKLOOK_RELEASE_PFX_BASE64 }}
        run: |
          if (-not $env:RELEASE_PFX_BASE64) { throw "QUICKLOOK_RELEASE_PFX_BASE64 is not configured." }
          New-Item -ItemType Directory -Path .signing -Force | Out-Null
          [IO.File]::WriteAllBytes('.signing/QuickLook.Next-Release.pfx', [Convert]::FromBase64String($env:RELEASE_PFX_BASE64))

      - name: Test and package signed release
        shell: pwsh
        env:
          RELEASE_PFX_PASSWORD: ${{ secrets.QUICKLOOK_RELEASE_PFX_PASSWORD }}
        run: |
          ./tools/release.ps1 `
            -ExpectedVersion "${{ steps.version.outputs.base_version }}" `
            -VersionPrefix "${{ steps.version.outputs.base_version }}" `
            -VersionSuffix "${{ steps.version.outputs.suffix }}" `
            -CertificatePath '.signing/QuickLook.Next-Release.pfx' `
            -CertificatePassword "$env:RELEASE_PFX_PASSWORD" `
            -SkipSystemImageSmoke

      - name: Delete release signing certificate
        if: always()
        shell: pwsh
        run: Remove-Item -LiteralPath '.signing' -Recurse -Force -ErrorAction SilentlyContinue

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist
          format: spdx-json
          output-file: artifacts/QuickLook.Next-${{ steps.version.outputs.tag }}-win-x64.spdx.json

      - name: Upload release artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: |
            artifacts/QuickLook.Next-Installer-${{ steps.version.outputs.version }}-win-x64.zip
            artifacts/QuickLook.Next-Installer-${{ steps.version.outputs.version }}-win-x64.zip.sha256
            artifacts/*.spdx.json
            artifacts/release-notes.md
          if-no-files-found: error
