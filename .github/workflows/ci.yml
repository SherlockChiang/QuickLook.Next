name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-2025
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302

      - uses: dtolnay/rust-toolchain@stable

      - name: Run release checks
        shell: pwsh
        run: ./tools/release.ps1 -SkipPackage -SkipSystemImageSmoke
