name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-2025
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath VERSION -Raw).Trim()
          if ("${{ github.event_name }}" -eq "push" -and "v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match VERSION ($version)."
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Reject an existing manual release tag
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Tag ${{ steps.version.outputs.tag }} already exists. Increment VERSION before publishing."
          }
          if ($LASTEXITCODE -ne 2) {
            throw "Could not check whether the release tag exists."
          }

      - name: Restore release signing certificate
        shell: pwsh
        env:
          RELEASE_PFX_BASE64: ${{ secrets.QUICKLOOK_RELEASE_PFX_BASE64 }}
        run: |
          if (-not $env:RELEASE_PFX_BASE64) {
            throw "QUICKLOOK_RELEASE_PFX_BASE64 is not configured."
          }
          New-Item -ItemType Directory -Path .signing -Force | Out-Null
          [IO.File]::WriteAllBytes(".signing/QuickLook.Next-Release.pfx", [Convert]::FromBase64String($env:RELEASE_PFX_BASE64))

      - name: Test and package release
        shell: pwsh
        env:
          RELEASE_PFX_PASSWORD: ${{ secrets.QUICKLOOK_RELEASE_PFX_PASSWORD }}
        run: ./tools/release.ps1 -ExpectedVersion "${{ steps.version.outputs.version }}" -CertificatePath ".signing/QuickLook.Next-Release.pfx" -CertificatePassword "$env:RELEASE_PFX_PASSWORD" -SkipSystemImageSmoke

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist
          format: spdx-json
          output-file: artifacts/QuickLook.Next-${{ steps.version.outputs.tag }}-win-x64.spdx.json

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickLook.Next-${{ steps.version.outputs.tag }}-win-x64
          path: |
            artifacts/QuickLook.Next-Installer-*.zip
            artifacts/QuickLook.Next-Installer-*.zip.sha256
            artifacts/*.spdx.json
          if-no-files-found: error

      - name: Attest release archive
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/QuickLook.Next-Installer-*.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/QuickLook.Next-Installer-*.zip
            artifacts/QuickLook.Next-Installer-*.zip.sha256
            artifacts/*.spdx.json
