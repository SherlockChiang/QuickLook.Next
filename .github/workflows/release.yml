name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: stable-release
  cancel-in-progress: false

jobs:
  package:
    # Accumulate normal feat/fix commits locally, then push one release: commit to publish them.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'release:')
    uses: ./.github/workflows/package-release.yml
    with:
      channel: stable

  publish:
    needs: package
    runs-on: windows-2025
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: ${{ needs.package.outputs.artifact-name }}
          path: artifacts

      - name: Revalidate downloaded installer
        shell: pwsh
        run: |
          ./tools/test-release-artifacts.ps1 `
            -InstallerPath (Get-Item artifacts/QuickLook.Next-Installer-*.zip).FullName `
            -ChecksumPath (Get-Item artifacts/QuickLook.Next-Installer-*.zip.sha256).FullName `
            -ExpectedMsixVersion "${{ needs.package.outputs.msix-version }}" `
            -ExpectedCertificatePath packaging/QuickLook.Next-Release.cer

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/QuickLook.Next-Installer-*.zip
            artifacts/QuickLook.Next-Installer-*.zip.sha256
            artifacts/*.spdx.json
            artifacts/release/*.json

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.package.outputs.tag }}
          name: QuickLook Next ${{ needs.package.outputs.version }}
          target_commitish: ${{ github.sha }}
          body_path: artifacts/release-notes.md
          fail_on_unmatched_files: true
          files: |
            artifacts/QuickLook.Next-Installer-*.zip
            artifacts/QuickLook.Next-Installer-*.zip.sha256
            artifacts/*.spdx.json
            artifacts/release/*.json
