name: Beta Release

on:
  workflow_dispatch:

concurrency:
  group: beta-release
  cancel-in-progress: false

jobs:
  package:
    uses: ./.github/workflows/package-release.yml
    with:
      channel: beta

  publish:
    needs: package
    runs-on: windows-2025
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: ${{ needs.package.outputs.artifact-name }}
          path: artifacts

      - name: Revalidate downloaded installer
        shell: pwsh
        run: |
          ./tools/test-release-artifacts.ps1 `
            -InstallerPath (Get-Item artifacts/QuickLook.Next-Installer-*.zip).FullName `
            -ChecksumPath (Get-Item artifacts/QuickLook.Next-Installer-*.zip.sha256).FullName `
            -ExpectedMsixVersion "${{ needs.package.outputs.msix-version }}" `
            -ExpectedCertificatePath packaging/QuickLook.Next-Release.cer

      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            artifacts/QuickLook.Next-Installer-*.zip
            artifacts/QuickLook.Next-Installer-*.zip.sha256
            artifacts/*.spdx.json
            artifacts/release/*.json

      - name: Publish beta release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ needs.package.outputs.tag }}"
          if (gh release view $tag 2>$null) {
            gh release edit $tag `
              --target "$env:GITHUB_SHA" `
              --title "QuickLook Next ${{ needs.package.outputs.version }}" `
              --notes-file artifacts/release-notes.md `
              --prerelease
            gh release upload $tag `
              artifacts/QuickLook.Next-Installer-*.zip `
              artifacts/QuickLook.Next-Installer-*.zip.sha256 `
              artifacts/*.spdx.json `
              artifacts/release/*.json `
              --clobber
          }
          else {
            gh release create $tag `
              artifacts/QuickLook.Next-Installer-*.zip `
              artifacts/QuickLook.Next-Installer-*.zip.sha256 `
              artifacts/*.spdx.json `
              artifacts/release/*.json `
              --target "$env:GITHUB_SHA" `
              --title "QuickLook Next ${{ needs.package.outputs.version }}" `
              --notes-file artifacts/release-notes.md `
              --prerelease
          }
