name: Beta Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build beta release
    runs-on: windows-latest
    outputs:
      beta-version: ${{ steps.version.outputs.beta-version }}
      release-tag: ${{ steps.version.outputs.release-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.6.0
        with:
          dotnet-version: 10.0.301

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.0
          targets: x86_64-pc-windows-msvc

      - name: Resolve beta version
        id: version
        shell: pwsh
        run: |
          $baseVersion = (Get-Content -LiteralPath VERSION -Raw).Trim()
          if ($baseVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "VERSION must use semantic X.Y.Z format. Current value: '$baseVersion'"
          }

          $betaVersion = "$baseVersion-beta.${{ github.run_number }}"
          "BASE_VERSION=$baseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BETA_VERSION=$betaVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=v$betaVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "beta-version=$betaVersion" >> $env:GITHUB_OUTPUT
          "release-tag=v$betaVersion" >> $env:GITHUB_OUTPUT

      - name: Test native layer
        shell: pwsh
        run: cargo test --locked --manifest-path native/quicklook_next_native/Cargo.toml

      - name: Test .NET and ParserHost boundaries
        shell: pwsh
        run: |
          cargo build --release --locked --manifest-path native/quicklook_next_native/Cargo.toml
          dotnet restore QuickLook.Next.slnx --locked-mode
          dotnet test QuickLook.Next.slnx -c Debug --no-restore

      - name: Check NuGet vulnerabilities
        shell: pwsh
        run: dotnet list QuickLook.Next.slnx package --vulnerable --include-transitive

      - name: Audit Rust dependencies
        shell: pwsh
        run: |
          cargo install cargo-audit --version 0.21.2 --locked
          cargo audit --file native/quicklook_next_native/Cargo.lock

      - name: Restore release signing certificate
        shell: pwsh
        env:
          RELEASE_PFX_BASE64: ${{ secrets.QUICKLOOK_RELEASE_PFX_BASE64 }}
        run: |
          if (-not $env:RELEASE_PFX_BASE64) {
            throw "QUICKLOOK_RELEASE_PFX_BASE64 is not configured."
          }
          New-Item -ItemType Directory -Path .signing -Force | Out-Null
          [IO.File]::WriteAllBytes(".signing/QuickLook.Next-Release.pfx", [Convert]::FromBase64String($env:RELEASE_PFX_BASE64))

      - name: Build MSIX installer
        shell: pwsh
        env:
          RELEASE_PFX_PASSWORD: ${{ secrets.QUICKLOOK_RELEASE_PFX_PASSWORD }}
        run: |
          dotnet restore QuickLook.Next.slnx --locked-mode
          ./tools/pack-msix.ps1 -VersionPrefix "$env:BASE_VERSION" -VersionSuffix "beta.${{ github.run_number }}" -CertificatePath ".signing/QuickLook.Next-Release.pfx" -CertificatePassword "$env:RELEASE_PFX_PASSWORD" -SkipSystemImageSmoke

      - name: Delete release signing certificate
        if: always()
        shell: pwsh
        run: Remove-Item -LiteralPath ".signing" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Generate CycloneDX NuGet SBOM
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\sbom | Out-Null
          $nugetSbom = "artifacts\sbom\QuickLook.Next-$env:BETA_VERSION-nuget.cdx.json"
          dotnet tool install CycloneDX --tool-path .tools --version 6.2.0
          & .\.tools\dotnet-CycloneDX.exe QuickLook.Next.slnx `
            --disable-package-restore `
            --output artifacts\sbom `
            --filename QuickLook.Next-$env:BETA_VERSION-nuget.cdx.json `
            --output-format Json `
            --spec-version 1.7 `
            --set-name QuickLook.Next `
            --set-version $env:BETA_VERSION
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path -LiteralPath $nugetSbom -PathType Leaf)) {
            throw "CycloneDX NuGet SBOM was not created: $nugetSbom"
          }
          if ((Get-Content -LiteralPath $nugetSbom -Raw | ConvertFrom-Json).specVersion -ne "1.7") {
            throw "NuGet SBOM did not use CycloneDX 1.7"
          }

      - name: Generate CycloneDX Cargo SBOM
        shell: pwsh
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx `
            --manifest-path native\quicklook_next_native\Cargo.toml `
            --format json `
            --describe binaries `
            --target x86_64-pc-windows-msvc `
            --target-in-filename `
            --override-filename QuickLook.Next-$env:BETA_VERSION-cargo
          if ($LASTEXITCODE -ne 0) {
            throw "CycloneDX Cargo SBOM generation failed"
          }
          $cargoSboms = @(Get-ChildItem -LiteralPath native\quicklook_next_native -Recurse -File `
            -Filter "QuickLook.Next-$env:BETA_VERSION-cargo*.cdx.json")
          if ($cargoSboms.Count -ne 1) {
            throw "Expected exactly one Cargo SBOM; found $($cargoSboms.Count)."
          }
          if (-not (Get-Content -LiteralPath $cargoSboms[0].FullName -Raw | ConvertFrom-Json).specVersion) {
            throw "Cargo SBOM is not CycloneDX JSON"
          }
          Move-Item -LiteralPath $cargoSboms[0].FullName `
            -Destination artifacts\sbom\QuickLook.Next-$env:BETA_VERSION-cargo.cdx.json `
            -Force

      - name: Resolve installer assets
        shell: pwsh
        run: |
          $zipPath = "artifacts/QuickLook.Next-Installer-$env:BETA_VERSION-win-x64.zip"
          $checksumPath = "$zipPath.sha256"
          if (-not (Test-Path -LiteralPath $zipPath) -or -not (Test-Path -LiteralPath $checksumPath)) {
            throw "MSIX installer assets were not created."
          }
          "RELEASE_ASSET=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHECKSUM_ASSET=$checksumPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: QuickLook.Next-${{ env.BETA_VERSION }}-win-x64
          path: |
            ${{ env.RELEASE_ASSET }}
            ${{ env.CHECKSUM_ASSET }}
            artifacts/sbom/*.cdx.json
          if-no-files-found: error

  publish:
    name: Publish beta release
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Download signed build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: QuickLook.Next-${{ needs.build.outputs.beta-version }}-win-x64
          path: artifacts

      - name: Attest release package and SBOMs
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            artifacts/QuickLook.Next-Installer-*.zip
            artifacts/QuickLook.Next-Installer-*.zip.sha256
            artifacts/sbom/*.cdx.json

      - name: Publish GitHub prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $betaVersion = "${{ needs.build.outputs.beta-version }}"
          $releaseTag = "${{ needs.build.outputs.release-tag }}"
          $notes = @"
          Automated beta build from commit $env:GITHUB_SHA.

          Version: $betaVersion

          The ZIP, checksum, and SBOM release assets have GitHub Artifact Attestations.
          Verify a downloaded asset with: gh attestation verify <asset-path> --repo $env:GITHUB_REPOSITORY
          "@

          gh release create $releaseTag artifacts/QuickLook.Next-Installer-*.zip artifacts/QuickLook.Next-Installer-*.zip.sha256 artifacts/sbom/*.cdx.json `
            --target $env:GITHUB_SHA `
            --title "QuickLook Next $betaVersion" `
            --notes $notes `
            --prerelease
